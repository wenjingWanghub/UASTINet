model:
  base_learning_rate: 4.5e-6
  target: taming.models.vqgan.VQModel
                                                                                                                   
  params:
                   
    embed_dim: 256                             
    n_embed: 1024
    ddconfig:
      double_z: False
      z_channels: 128
      resolution: 256
      in_channels: 6
      out_ch: 3
      ch: 128
      ch_mult: [ 1,1]                             
      num_res_blocks: 2
      attn_resolutions: [16]
      dropout: 0.3

    lossconfig:
      target: taming.modules.losses.vqperceptual.VQLPIPSWithDiscriminator
      params:
        disc_conditional: False
        disc_in_channels: 3
        disc_start: 10000
        disc_weight: 0.8
        codebook_weight: 1.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 1
    num_workers: 0        
    train:
      target: taming.data.custom.CustomTrain
      params:
        training_images_list_file: /home/dataset/image_inpainting_dataset/train/dunhuang_train.txt
        size: 256
    validation:
      target: taming.data.custom.CustomTest
      params:
        test_images_list_file: /home/dataset/image_inpainting_dataset/test/dunhuang_test.txt
        size: 256
lightning:
  trainer:                      
    max_epochs: 150                         
    gpus: "1,"             
    precision: 32
    accumulate_grad_batches: 1                        
    gradient_clip_val: 1.0              

  logger:                          
    target: pytorch_lightning.loggers.TestTubeLogger
    params:
      name: "dunhuang_vqgan"                            
      save_dir: "logs"                          
  modelcheckpoint:           
    target: pytorch_lightning.callbacks.ModelCheckpoint
    params:
      dirpath: "logs/checkpoints"                              
      filename: "{epoch:06}"                            
      verbose: True
      save_last: True                 
      save_top_k: 3              
      monitor: "val/rec_loss"
  callbacks:                           
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 1000                   
        max_images: 10                                
        clamp: True
        save_dir_override:               
          train: /home/wangwenjing/taming-transformers-master/logs/train
          val: /home/wangwenjing/taming-transformers-master/logs/val

    learning_rate_logger:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: "step"
